<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { padding: 28px 24px; background: var(--bg-primary); }
.grid { display: flex; gap: 10px; flex-wrap: wrap; }
.cell { position: relative; width: 56px; height: 50px; background: var(--bg-primary); box-shadow: var(--neu-raised-sm); border: none; border-radius: 6px; font-family: var(--font-heading); font-weight: 600; font-size: 13px; letter-spacing: 0.08em; color: var(--fg-primary); cursor: pointer; }
.cell.active { box-shadow: var(--neu-inset); color: var(--accent); }
.cell.active::after { content: ''; position: absolute; inset: 0; border: 1px solid var(--accent); border-radius: 6px; pointer-events: none; }
.cell.oos { color: var(--fg-muted); cursor: not-allowed; }
.cell.oos::before { content: ''; position: absolute; top: 50%; left: 15%; right: 15%; height: 1px; background: var(--fg-muted); transform: rotate(-14deg); }
.chip { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-primary); box-shadow: var(--neu-raised-sm); padding: 4px; position: relative; }
.chip .sw { width: 100%; height: 100%; border-radius: 6px; box-shadow: var(--neu-inset-sm); }
.chip.active { box-shadow: var(--neu-inset); }
.chip.active::after { content: ''; position: absolute; inset: -3px; border: 1px solid var(--accent); border-radius: 12px; pointer-events: none; }
.hdr { font-family: var(--font-heading); font-size: 11px; letter-spacing: 0.22em; color: var(--fg-muted); text-transform: uppercase; padding-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.hdr::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
.sub { font-family: var(--font-heading); font-size: 9px; letter-spacing: 0.22em; color: var(--fg-muted); margin: 14px 0 6px; }
</style></head><body>
<div class="hdr">SELECTORS — SIZES · COLORWAYS</div>
<div class="sub">SIZE GRID · REST / ACTIVE / OOS</div>
<div class="grid">
  <button class="cell">XS</button>
  <button class="cell">S</button>
  <button class="cell active">M</button>
  <button class="cell">L</button>
  <button class="cell oos">XL</button>
  <button class="cell">XXL</button>
</div>
<div class="sub">COLORWAY CHIPS</div>
<div class="grid">
  <div class="chip active"><span class="sw" style="background:#ecead8"></span></div>
  <div class="chip"><span class="sw" style="background:#2b2d3a"></span></div>
  <div class="chip"><span class="sw" style="background:#9b3e1d"></span></div>
  <div class="chip"><span class="sw" style="background:#3e4231"></span></div>
</div>
</body></html>
