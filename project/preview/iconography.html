<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { padding: 28px; background: var(--bg-primary); }
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; text-align: center; }
.icon-wrap { width: 64px; height: 64px; background: var(--bg-primary); box-shadow: var(--neu-flat); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; color: var(--fg-primary); }
.lbl { font-family: var(--font-heading); font-size: 9px; letter-spacing: 0.22em; color: var(--fg-muted); text-transform: uppercase; }
.hdr { font-family: var(--font-heading); font-size: 11px; letter-spacing: 0.22em; color: var(--fg-muted); text-transform: uppercase; padding-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.hdr::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
</style></head><body>
<div class="hdr">ICONOGRAPHY — 1PX STROKE SVG (LUCIDE FALLBACK)</div>
<div class="row">
  <div><div class="icon-wrap"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><div class="lbl">SEARCH</div></div>
  <div><div class="icon-wrap"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><div class="lbl">CART</div></div>
  <div><div class="icon-wrap"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div><div class="lbl">WATCHLIST</div></div>
  <div><div class="icon-wrap"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div><div class="lbl">LINK</div></div>
  <div><div class="icon-wrap" style="color: var(--accent); font-family: var(--font-mono); font-size: 30px; line-height: 1">●</div><div class="lbl">STATUS DOT</div></div>
</div>
</body></html>
