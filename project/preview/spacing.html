<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { padding: 28px 24px; background: var(--bg-primary); }
.row { display: flex; gap: 10px; align-items: flex-end; }
.bar { background: var(--accent-soft); border: 1px dashed rgba(232,93,38,0.4); text-align: center; font-family: var(--font-mono); font-size: 9px; color: var(--accent-deep); letter-spacing: 0.08em; padding-top: 6px; }
.lbl { font-family: var(--font-heading); font-size: 9px; letter-spacing: 0.22em; color: var(--fg-muted); text-transform: uppercase; margin-top: 4px; text-align: center; }
.hdr { font-family: var(--font-heading); font-size: 11px; letter-spacing: 0.22em; color: var(--fg-muted); text-transform: uppercase; padding-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.hdr::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
</style></head><body>
<div class="hdr">SPACING · 4PX BASE</div>
<div class="row">
  <div><div class="bar" style="width:28px;height:4px"></div><div class="lbl">1<br/>4px</div></div>
  <div><div class="bar" style="width:28px;height:8px"></div><div class="lbl">2<br/>8px</div></div>
  <div><div class="bar" style="width:28px;height:12px"></div><div class="lbl">3<br/>12px</div></div>
  <div><div class="bar" style="width:38px;height:16px"></div><div class="lbl">4<br/>16px</div></div>
  <div><div class="bar" style="width:48px;height:24px"></div><div class="lbl">5<br/>24px</div></div>
  <div><div class="bar" style="width:58px;height:32px"></div><div class="lbl">6<br/>32px</div></div>
  <div><div class="bar" style="width:68px;height:48px"></div><div class="lbl">7<br/>48px</div></div>
  <div><div class="bar" style="width:78px;height:64px"></div><div class="lbl">8<br/>64px</div></div>
</div>
</body></html>
